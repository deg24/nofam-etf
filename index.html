<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>노팸 ETF 순위</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f4f5f7; display: flex; justify-content: center; padding: 20px; }
    .app-container { width: 100%; max-width: 480px; background: #ffffff; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); overflow: hidden; }
    .header { padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #f0f0f0; }
    .header h2 { font-size: 1.4rem; color: #111; font-weight: 700; }
    .header-info { display: flex; flex-direction: column; align-items: flex-end; }
    .header-info #current-date { color: #555; font-size: 0.9rem; font-weight: 600; }
    .header-info #update-time { color: #999; font-size: 0.75rem; margin-top: 2px; }
    .list-header { display: flex; padding: 12px 20px; background: #fafbfc; font-size: 0.8rem; color: #666; border-bottom: 1px solid #f0f0f0; }
    .col-rank { flex: 0.6; text-align: center; }
    .col-name { flex: 1.5; text-align: left; padding-left: 10px; }
    .col-stock { flex: 1.2; text-align: left; }
    .col-return { flex: 1; text-align: right; }
    .ranking-item { border-bottom: 1px solid #f0f0f0; }
    .ranking-item:last-child { border-bottom: none; }
    .main-row { display: flex; align-items: center; padding: 16px 20px; transition: background-color 0.2s ease; }
    .ranking-item.has-log .main-row { cursor: pointer; }
    .ranking-item.has-log .main-row:active { background-color: #f9f9f9; }
    .ranking-item.expanded .main-row { background-color: #f0f7ff; border-left: 4px solid #3498db; padding-left: 16px; }
    .rank-box { display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .rank-num { font-weight: 700; color: #111; font-size: 1.05rem; }
    .rank-change { font-size: 0.7rem; font-weight: 600; margin-top: 2px; }
    .main-row .col-name { display: flex; align-items: center; gap: 4px; font-weight: 600; color: #333; padding-left: 10px; font-size: 0.95rem; letter-spacing: -0.5px;}
    .main-row .col-stock { font-size: 0.95rem; color: #555; }
    .main-row .col-return { font-weight: 700; font-size: 1rem; }
    .toggle-icon { font-size: 0.7rem; color: #999; transition: transform 0.3s ease; display: inline-block; margin-left: 2px; }
    .ranking-item.expanded .toggle-icon { transform: rotate(180deg); color: #3498db; }
    .log-container { display: none; padding: 20px; background: #f8f9fa; border-top: 1px solid #e1e8ed; }
    .ranking-item.expanded .log-container { display: block; }
    .log-header { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; color: #111; display: flex; justify-content: space-between; }
    .close-btn { color: #999; cursor: pointer; font-weight: normal; padding: 0 5px; }
    .log-list { list-style: none; }
    .log-list li { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #e0e0e0; font-size: 0.9rem; color: #444; }
    .log-list li:last-child { border-bottom: none; padding-bottom: 0; }
    .log-date { color: #888; font-size: 0.8rem; margin-right: 8px; }
    .text-green { color: #2ecc71; }
    .text-red { color: #e74c3c; }   
    .text-gray { color: #95a5a6; }
  </style>
</head>
<body>

  <div class="app-container">
    <header class="header">
      <h2>노팸 ETF</h2>
      <div class="header-info">
        <span id="current-date"></span>
        <span id="update-time">불러오는 중...</span>
      </div>
    </header>
    <div class="list-header">
      <div class="col-rank">순위</div>
      <div class="col-name">투자자</div>
      <div class="col-stock">보유 종목</div>
      <div class="col-return">실시간 수익률</div>
    </div>
    <main id="ranking-list">
      <div style="text-align:center; padding: 40px; color:#888;">데이터를 불러오는 중입니다...</div>
    </main>
  </div>

  <script>
    // 🔥 여기에 '새 배포'로 발급받은 새로운 API_URL을 넣으세요! 🔥
    const API_URL = "https://script.google.com/macros/s/AKfycbxlXF2_XTFDoCnz56tT3NlOQmBT_NBAGPVD6MYpsBTaIGPxzn8NXh3NvegpKmZVCjVddw/exec"; 

    const listContainer = document.getElementById('ranking-list');

    const today = new Date();
    const dateString = `${today.getFullYear().toString().slice(2)}.${String(today.getMonth() + 1).padStart(2, '0')}.${String(today.getDate()).padStart(2, '0')}`;
    document.getElementById('current-date').innerText = dateString;

    function getColorClass(val) {
      if (val.startsWith('+')) return 'text-green';
      if (val.startsWith('-')) return 'text-red';
      return 'text-gray';
    }

    function getRankChangeHTML(change) {
      if (change > 0) return `<span class="rank-change text-green">▲ ${change}</span>`;
      if (change < 0) return `<span class="rank-change text-red">▼ ${Math.abs(change)}</span>`;
      return `<span class="rank-change text-gray">-</span>`;
    }

    async function fetchRankingData() {
      if(API_URL === "여기에_새로운_URL을_붙여넣으세요") {
        listContainer.innerHTML = "<div style='text-align:center; padding: 30px; color: red;'>API_URL을 먼저 입력해주세요!</div>";
        return;
      }

      try {
        const response = await fetch(API_URL);
        let rawData = await response.json();

        // 실시간 수익률 계산 (순위에는 영향 주지 않음)
        rawData.forEach(item => {
          if (!item.purchasePrice || !item.currentPrice) {
            item.returnVal = "0.00";
            return;
          }
          let calcReturn = ((item.currentPrice - item.purchasePrice) / item.purchasePrice) * 100;
          let sign = calcReturn > 0 ? '+' : '';
          item.returnVal = sign + calcReturn.toFixed(2);
          
          if (!item.logs || typeof item.logs === 'string') item.logs = [];
        });

        // 🔥 여기가 핵심! 구글 시트가 아침 6시에 박아둔 '고정 순위(rank)'를 기준으로 화면을 줄세웁니다.
        rawData.sort((a, b) => a.rank - b.rank);

        renderList(rawData);

        const now = new Date();
        const timeString = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')} 갱신`;
        document.getElementById('update-time').innerText = timeString;

      } catch (error) {
        listContainer.innerHTML = "<div style='text-align:center; padding: 30px; color: red;'>데이터를 불러오는데 실패했습니다.</div>";
        document.getElementById('update-time').innerText = "갱신 실패";
        console.error("Fetch Error:", error);
      }
    }

    function renderList(data) {
      let finalHtml = '';
      data.forEach((item, index) => {
        const hasLog = item.logs && item.logs.length > 0;
        
        let html = `
          <div class="ranking-item ${hasLog ? 'has-log' : ''}" id="item-${index}">
            <div class="main-row">
              <div class="col-rank rank-box">
                <span class="rank-num">${item.rank || '-'}</span>
                ${getRankChangeHTML(item.rankChange || 0)}
              </div>
              <div class="col-name">${item.name} ${hasLog ? '<span class="toggle-icon">▼</span>' : ''}</div>
              <div class="col-stock">${item.stock}</div>
              <div class="col-return ${getColorClass(item.returnVal)}">${item.returnVal}%</div>
            </div>
        `;

        if (hasLog) {
          let logListHtml = item.logs.map(log => `
            <li>
              <span><span class="log-date">${log.date}</span>${log.stock}</span>
              <span class="${getColorClass(log.returnVal)}">${log.returnVal}%</span>
            </li>
          `).join('');

          html += `
            <div class="log-container">
              <div class="log-header">과거 거래 로그 <span class="close-btn">✕</span></div>
              <ul class="log-list">${logListHtml}</ul>
            </div>
          `;
        }
        html += `</div>`;
        finalHtml += html;
      });

      listContainer.innerHTML = finalHtml;

      const logItems = document.querySelectorAll('.ranking-item.has-log');
      logItems.forEach(item => {
        const mainRow = item.querySelector('.main-row');
        const closeBtn = item.querySelector('.close-btn');

        mainRow.addEventListener('click', () => item.classList.toggle('expanded'));
        if (closeBtn) {
          closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            item.classList.remove('expanded');
          });
        }
      });
    }

    fetchRankingData();
  </script>
</body>
</html>
